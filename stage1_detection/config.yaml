# Stage 1 — Damage Detection config (Ultralytics dataset + training)
#
# NOTE: Classes are 5 damage-TYPE buckets pooled from 4 source datasets
# (sindhu v9, CarDD, nivethetha v1, damagelocation v7). Per-dataset class
# remaps live in dataset.py (DATASETS registry). See taxonomy-v2-CLAUDE.md
# for the rationale (adds `scratch`, drops `tire_flat`).

# --- Dataset (paths are relative to this config file's location) ---
path: ../data/splits
train: train/images
val: val/images
test: test/images

# --- Classes (5 merged damage-type buckets) ---
nc: 5
names:
  0: dent
  1: scratch
  2: glass_damage
  3: light_damage
  4: mirror_damage

# --- Training hyperparameters (baseline; tune after first run) ---
model: yolo11m.pt        # n < s < m < l < x
epochs: 100
imgsz: 640
batch: 16
lr0: 0.01
lrf: 0.1
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3
patience: 20             # early stopping
save_period: 10
workers: 4
device: mps             # Apple Silicon; override to 0 (CUDA) or cpu as needed

# --- Augmentation (Ultralytics built-in; albumentations runs offline) ---
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 10.0
translate: 0.1
scale: 0.5
shear: 2.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1

# --- Logging ---
project: vehicle-damage-detection
name: yolo11m-v2-5class
